name: tf-checks
permissions:
  id-token: write
on:
  pull_request:
jobs:
  ec2-network-mode-awsvpc:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@v2
    with:
      working_directory: './examples/ec2-network-mode-awsvpc/'
      provider: aws
    secrets: 
      BUILD_ROLE: ${{ secrets.BUILD_ROLE }}
  ec2-network-mode-bridge:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@v2
    with:
      working_directory: './examples/ec2-network-mode-bridge/'
      provider: aws
    secrets: 
      BUILD_ROLE: ${{ secrets.BUILD_ROLE }}
  fargate:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@v2
    with:
      working_directory: './examples/fargate/'
      provider: aws
    secrets: 
      BUILD_ROLE: ${{ secrets.BUILD_ROLE }}

